<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{UNIT_TITLE_EN}} · {{UNIT_TITLE_ZH}} · 外研版 {{GRADE_LABEL}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Nunito", "PingFang SC", system-ui, -apple-system, sans-serif;
      background: #0e0e0e;
      color: #e8e8e8;
      line-height: 1.7;
      min-height: 100vh;
    }
    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      text-decoration: none;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .back-link:hover { background: rgba(0,0,0,0.6); }

    /* ===== Hero ===== */
    .hero {
      position: relative;
      height: 340px;
      background: var(--hero-bg, #1a1a1a) center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 32px 20px;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 40%, rgba(14,14,14,1) 100%);
    }
    .hero-content { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; width: 100%; }
    .hero-title-en {
      font-size: 32px;
      font-weight: 800;
      color: white;
      line-height: 1.1;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .hero-title-zh {
      font-size: 18px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 12px;
    }
    .hero-stats {
      display: flex;
      gap: 8px;
      font-size: 12px;
      flex-wrap: wrap;
    }
    .hero-stat {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ===== Story card grid ===== */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    .section-title {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }
    .story-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .story-card {
      position: relative;
      display: block;
      aspect-ratio: 16/9;
      background: var(--card-bg, #2a2a2a) center/cover no-repeat;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .story-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    .story-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%);
    }
    .story-card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      z-index: 2;
    }
    .story-tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .story-tag.review {
      background: rgba(184, 134, 11, 0.4);
    }
    .story-title-zh {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 2px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    .story-title-en {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 6px;
    }
    .story-info {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }
    .play-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
      transition: all 0.2s;
    }
    .story-card:hover .play-icon {
      background: rgba(255,255,255,0.35);
      transform: scale(1.1);
    }

    @media (max-width: 600px) {
      .hero { height: 260px; padding: 24px 16px; }
      .hero-title-en { font-size: 24px; }
      .hero-title-zh { font-size: 15px; }
      .story-grid { grid-template-columns: 1fr; }
      .container { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <a class="back-link" href="{{ROOT_INDEX_PATH}}">← 单元列表</a>

  <header class="hero" style="--hero-bg: url('{{HERO_COVER}}')">
    <div class="hero-content">
      <div class="hero-title-en">{{UNIT_TITLE_EN}}</div>
      <div class="hero-title-zh">{{UNIT_TITLE_ZH}}</div>
      <div class="hero-stats">
        <span class="hero-stat">📖 外研版 · {{GRADE_LABEL}}</span>
        <span class="hero-stat">📚 {{TOTAL_WORDS}} 词</span>
        <span class="hero-stat">🎙 {{N_THEMES}} 个故事</span>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="section-title">选择故事开始学习</div>
    <div class="story-grid">
      {{STORY_CARDS_HTML}}
    </div>
  </div>
</body>
</html>
